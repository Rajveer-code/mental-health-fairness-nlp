name: cpfe-nlp
channels:
  - pytorch
  - conda-forge
  - defaults

dependencies:
  - python=3.10
  - pip

  # Deep learning
  - pytorch::pytorch=2.1.0
  - pytorch::torchvision
  - pytorch::torchaudio

  - pip:
    # Core NLP
    - transformers==4.36.0
    - datasets==2.16.0
    - captum==0.7.0
    - tokenizers==0.15.0

    # ML utilities
    - scikit-learn==1.3.2
    - scipy==1.11.4
    - numpy==1.26.2
    - pandas==2.1.4
    - imbalanced-learn==0.11.0

    # Visualisation
    - matplotlib==3.8.2
    - seaborn==0.13.0

    # Utilities
    - tqdm==4.66.1
    - pyyaml==6.0.1
    - rapidfuzz==3.5.2

    # Notebooks (optional)
    - jupyter==1.0.0
    - ipykernel

    # Explainability
    - shap==0.44.0

    # Optional: GPT-4 evaluation (gpt_eval.py — see Section 4)
    - openai>=1.0.0
